policy:
  local_first: true
  privacy_weight: 1.0
  latency_weight: 0.5
  cost_weight: 0.3
  max_cost_per_1k_tokens: 0.0
  preferred_providers:
    - lmstudio
    - ollama
    - claude
    - gemini
    - huggingface
    - replicate

# Cloud Models (require API keys)
