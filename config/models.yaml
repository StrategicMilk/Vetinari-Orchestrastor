# =============================================================================
# Vetinari Model Configuration
# Hardware: RTX 5090 (32 GB VRAM), 9950X3D CPU, 64 GB DDR5-6000 RAM
# =============================================================================

# ---------------------------------------------------------------------------
# Hardware profile — used by VRAMManager and model routing decisions
# ---------------------------------------------------------------------------
hardware:
  gpu_vram_gb: 32
  system_ram_gb: 64
  cpu_offload_enabled: true
  # RAM available for model CPU-offload after OS + apps
  max_cpu_offload_gb: 30
  # Estimated tokens/sec by model size tier (Q4 on 5090)
  throughput_estimates:
    tiny_1b_3b: 120     # tokens/sec
    small_7b_8b: 70
    medium_14b_15b: 45
    large_30b_32b: 25
    xlarge_70b_72b: 10  # requires partial CPU offload

# ---------------------------------------------------------------------------
# Local models (LM Studio — OpenAI-compatible API)
# ---------------------------------------------------------------------------
models:
  # ── PRIMARY MODEL ──────────────────────────────────────────────────────────
  # Your main model: discovered dynamically, VL + reasoning + uncensored thinking
  - model_id: "qwen3-vl-32b-gemini-heretic-uncensored-thinking"
    provider: "lmstudio"
    model_family: "qwen3"
    display_name: "Qwen3 VL 32B Gemini Heretic (Uncensored)"
    capabilities:
      - coding
      - reasoning
      - vision
      - analysis
      - creative
      - uncensored
    context_window: 32768
    latency_hint: "medium"
    privacy_level: "local"
    # Q4_K_M quantisation fits in 32 GB VRAM
    memory_requirements_gb: 20
    quantization: "q4_k_m"
    status: "available"
    endpoint: "${LM_STUDIO_HOST}/v1/chat/completions"
    preferred_for:
      - general
      - planning
      - reasoning
      - vision
      - creative

  # ── FAST CODER ─────────────────────────────────────────────────────────────
  - model_id: "qwen2.5-coder-7b"
    provider: "lmstudio"
    model_family: "qwen2.5"
    display_name: "Qwen 2.5 Coder 7B"
    capabilities:
      - coding
      - fast
    context_window: 32768
    latency_hint: "fast"
    privacy_level: "local"
    memory_requirements_gb: 6
    quantization: "q4_k_m"
    status: "available"
    endpoint: "${LM_STUDIO_HOST}/v1/chat/completions"
    preferred_for:
      - code_generation
      - quick_review
      - classification

  # ── MEDIUM REASONING ───────────────────────────────────────────────────────
  - model_id: "qwen3-30b-a3b"
    provider: "lmstudio"
    model_family: "qwen3"
    display_name: "Qwen 3 30B A3B"
    capabilities:
      - reasoning
      - coding
    context_window: 32768
    latency_hint: "medium"
    privacy_level: "local"
    # 30B Q4 fits comfortably within 32 GB VRAM
    memory_requirements_gb: 18
    quantization: "q4_k_m"
    status: "available"
    endpoint: "${LM_STUDIO_HOST}/v1/chat/completions"
    preferred_for:
      - planning
      - architecture
      - complex_reasoning

  # ── VISION + CODING ────────────────────────────────────────────────────────
  - model_id: "qwen2.5-vl-32b"
    provider: "lmstudio"
    model_family: "qwen2.5"
    display_name: "Qwen 2.5 VL 32B"
    capabilities:
      - vision
      - coding
    context_window: 32768
    latency_hint: "medium"
    privacy_level: "local"
    memory_requirements_gb: 20
    quantization: "q4_k_m"
    status: "available"
    endpoint: "${LM_STUDIO_HOST}/v1/chat/completions"
    preferred_for:
      - ui_design
      - image_analysis
      - visual_tasks

  # ── LARGE REASONING (CPU offload required) ─────────────────────────────────
  - model_id: "qwen2.5-72b"
    provider: "lmstudio"
    model_family: "qwen2.5"
    display_name: "Qwen 2.5 72B"
    capabilities:
      - reasoning
      - coding
    context_window: 32768
    latency_hint: "slow"
    privacy_level: "local"
    # 72B Q4 ~ 42 GB total; ~32 GB on GPU + ~10 GB CPU offload
    memory_requirements_gb: 42
    quantization: "q4_k_m"
    requires_cpu_offload: true
    status: "available"
    endpoint: "${LM_STUDIO_HOST}/v1/chat/completions"
    preferred_for:
      - complex_analysis
      - deep_reasoning

  - model_id: "llama-3.3-70b"
    provider: "lmstudio"
    model_family: "llama"
    display_name: "Llama 3.3 70B"
    capabilities:
      - reasoning
      - coding
    context_window: 131072
    latency_hint: "slow"
    privacy_level: "local"
    memory_requirements_gb: 40
    quantization: "q4_k_m"
    requires_cpu_offload: true
    status: "available"
    endpoint: "${LM_STUDIO_HOST}/v1/chat/completions"
    preferred_for:
      - long_context
      - complex_reasoning

  # ── TINY / UTILITY ─────────────────────────────────────────────────────────
  - model_id: "llama-3.2-1b"
    provider: "lmstudio"
    model_family: "llama"
    display_name: "Llama 3.2 1B"
    capabilities:
      - fast
      - classification
    context_window: 131072
    latency_hint: "fast"
    privacy_level: "local"
    memory_requirements_gb: 2
    quantization: "q4_k_m"
    status: "available"
    endpoint: "${LM_STUDIO_HOST}/v1/chat/completions"
    preferred_for:
      - classification
      - extraction
      - compression
      - triage

# ---------------------------------------------------------------------------
# Routing policy — local-first, privacy-weighted
# ---------------------------------------------------------------------------
policy:
  local_first: true
  # Weights for scoring: higher = more important
  privacy_weight: 1.0
  latency_weight: 0.5
  cost_weight: 0.3
  # Null = no cloud cost ceiling; set a positive value to cap (e.g. 0.01)
  max_cost_per_1k_tokens: null
  # Provider preference order (first = highest priority)
  preferred_providers:
    - lmstudio
    - ollama
    - claude
    - gemini
    - huggingface
    - replicate
  # Fallback: if local LM Studio is unreachable, allow cloud escalation
  allow_cloud_fallback: true
  cloud_fallback_trigger: "lmstudio_unreachable"

