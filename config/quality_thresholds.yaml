# Task-dependent quality thresholds.
#
# Different task types have different quality stakes:
# security audits need higher confidence than documentation.
#
# The self-refinement loop uses these thresholds to decide when
# to trigger additional refinement passes.

# Default threshold for unrecognized task types
default: 0.70

thresholds:
  security_audit: 0.85     # High stakes — security must be rigorous
  code_review: 0.75        # Moderate-high — catches bugs before merge
  test_generation: 0.80    # High — tests must be correct or they're worse than none
  documentation: 0.65      # Lower bar — docs are human-reviewed anyway
  analysis: 0.70           # Standard — research and investigation
  code: 0.75               # Code generation quality bar
  creative: 0.60           # Creative tasks — subjective quality
  data: 0.70               # Data processing — needs correctness
  devops: 0.75             # DevOps — infrastructure changes need reliability
  planning: 0.65           # Planning — iterative by nature
  general: 0.70            # Fallback for uncategorized tasks
