# Provider Model Definitions
# ==========================
# External config for cloud LLM provider model lists.
# Update this file when providers release new models — no code changes needed.
#
# Fields per model:
#   id: API model identifier
#   name: Human-readable display name
#   context_len: Max context tokens
#   memory_gb: Memory footprint estimate in GB
#   latency_estimate_ms: Estimated latency in milliseconds
#   cost_per_1k_tokens: Cost in USD per 1K tokens (blended)
#   capabilities: List of capability tags (code_gen, chat, reasoning, vision, retrieval)
#   free_tier: Whether the model has a free tier (default false)

providers:

