# model_families.yaml
#
# Vetinari Model Family Knowledge Base
#
# This file provides granular, curated knowledge about LLM model families for use
# by Vetinari's domain expertise layer. It drives intelligent routing, capability
# matching, and agent role assignment. Capability ratings are on a 0.0-1.0 scale
# relative to the best available open-weight models at time of authoring (2026-04).
#
# Maintainers: update `superseded_by` and `available_sizes` as new generations ship.
# Do NOT remove families — set superseded_by instead.

model_families:

  llama:
    name: Llama (3.x series)
    vendor: Meta
    architecture_type: dense
    available_sizes: [1, 3, 8, 70, 405]
    context_lengths:
      1: 8192
      3: 128000
      8: 128000
      70: 128000
      405: 128000
    chat_format: llama-3
    native_capabilities:
      - function_calling
      - code_generation
      - multilingual
    strengths:
      - Well-rounded generalist — competitive across nearly every task category
      - Largest open-weight fine-tune ecosystem (LoRA, GGUF, merges)
      - Strong general reasoning at 70B+ that approaches proprietary models
      - Good multilingual coverage across European and Asian languages
      - Consistent instruction following across size tiers
    weaknesses:
      - Jack-of-all-trades — rarely best-in-class at any single task
      - 70B and 405B require substantial VRAM (40GB+ for full precision)
      - 1B and 3B sizes show noticeably weaker multi-step reasoning
      - No native vision in text-only variants
      - Slightly behind Qwen/DeepSeek on competitive coding benchmarks
    capabilities:
      coding:
        python: 0.82
        javascript: 0.80
        rust: 0.65
        sql: 0.78
        code_generation: 0.82
        debugging: 0.72
        refactoring: 0.68
        code_review: 0.70
      writing:
        technical_docs: 0.78
        creative_fiction: 0.70
        marketing_copy: 0.65
        academic: 0.72
      reasoning:
        mathematical: 0.75
        logical: 0.80
        causal: 0.72
        spatial: 0.45
      analysis:
        data_analysis: 0.75
        code_analysis: 0.78
        text_analysis: 0.80
        security_analysis: 0.65
      math:
        arithmetic: 0.82
        algebra: 0.78
        calculus: 0.65
        statistics: 0.72
        proofs: 0.55
      classification:
        sentiment: 0.82
        intent: 0.80
        topic: 0.83
        entity_recognition: 0.78
      instruction_following: 0.84
      long_context_quality: 0.76
    recommended_roles:
      - Worker
      - Foreman
    superseded_by: null
    notes: >
      Llama 3.3 70B offers near-405B quality at a fraction of the VRAM cost and is
      the recommended default for Foreman duties when DeepSeek R1 is unavailable.
      The 1B/3B Llama 3.2 variants are best treated as routing/classification models
      rather than reasoning agents.

