    strengths:
      - Exceptional Python coding — top open-weight performer on HumanEval and SWE-Bench
      - Best-in-class math reasoning across size tiers (rivals GPT-4 at 72B)
      - Excellent structured output and function calling reliability
      - Very strong SQL — suitable for database agent tasks without prompting tricks
      - Small sizes (0.5B–3B) punch far above weight on classification and extraction
    weaknesses:
      - Creative writing feels mechanical; lacks narrative voice
      - English prose occasionally shows non-native phrasing artifacts
      - Repetition loops appear in some 7B/14B long-form tasks
      - Fewer third-party instruction fine-tunes than Llama
      - Qwen3 MoE variants need careful VRAM planning (total vs active params)
