      Qwen 2.5 Coder 7B/14B/32B are the primary recommended coding Workers in
      Vetinari. The 72B instruction variant is competitive with Llama 3.3 70B for
      Foreman tasks while maintaining a coding edge. Qwen3 (0.6B, 1.7B, 4B, 8B,
      14B, 32B) is the successor generation — prefer Qwen3 when GGUF builds are
      available; available_sizes above reflects Qwen 2.5 as the production-stable
      generation.

