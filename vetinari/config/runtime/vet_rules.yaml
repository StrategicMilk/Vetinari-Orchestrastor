# Rules promoted from audit findings to automatic enforcement.
# Schema version: 1
#
# Populate via: python scripts/promote_findings_to_rules.py --run-root <path>
# Consumed by:  python scripts/quality/check_vetinari_rules.py (--yaml path optional, defaults here)
#
# Each rule entry shape:
#   - id: VET<NNN>               # allocate from next unused ID
#     category: <category_name>
#     description: <human message displayed on violation>
#     pattern_type: regex         # currently supported: regex
#     pattern: <regex pattern>
#     include_globs: [<glob>]     # optional project-relative scan scope beyond default Python files
#     exclude_globs: [<glob>]     # optional project-relative exclusions for fixtures/docs
#     severity: error | warning
#     gating: true | false        # defaults to true; false means advisory-only/non-release-gating
#     source_finding: <finding-registry finding-id>
#     promoted_from_run: <run-id>
#     promoted_at: <ISO8601>
version: 1
rules:
  - id: VET300
    category: supply_chain
    description: "Unpinned uvx execution in release/operator path; pin the package version or classify the path as non-release tooling."
    pattern_type: regex
    pattern: 'uvx\s+[^\n]*@latest'
    severity: error
    source_finding: pass-2334-prevention
    promoted_from_run: audit-prevention-2026-04-19
    promoted_at: "2026-04-19T00:00:00Z"
  - id: VET301
    category: supply_chain
    description: "Raw pip install command without a lockfile/hash/requirements source; use pinned requirements or an explicit approval policy."
    pattern_type: regex
    pattern: '\b(?:python\s+-m\s+)?pip\s+install\s+(?!-[rc]\b|--requirement\b|--constraint\b)["'']?[A-Za-z0-9_.-]+["'']?'
    severity: warning
    source_finding: pass-2334-prevention
    promoted_from_run: audit-prevention-2026-04-19
    promoted_at: "2026-04-19T00:00:00Z"
  - id: VET302
    category: artifact_trust
    description: "Unsafe pickle/joblib load needs a trusted root, integrity metadata, and provenance validation."
    pattern_type: regex
    pattern: '\b(?:pickle|joblib)\.load\s*\('
    severity: warning
    source_finding: pass-2334-prevention
    promoted_from_run: audit-prevention-2026-04-19
    promoted_at: "2026-04-19T00:00:00Z"
  - id: VET303
    category: research_integrity
    description: "Plain HTTP research/RAG source can poison prompts or evidence; require HTTPS or explicit degraded classification."
    pattern_type: regex
    pattern: 'http://export\.arxiv\.org|ingest_url\s*\(\s*["'']http://'
    severity: warning
    source_finding: pass-2334-prevention
    promoted_from_run: audit-prevention-2026-04-19
    promoted_at: "2026-04-19T00:00:00Z"
  - id: VET304
    category: proof_quality
    description: "Tautological test assertion (`assert X or True`); replace with an effect proof against the real implementation path."
    pattern_type: regex
    # Narrowed 2026-04-19: original pattern flagged every `assert isinstance(...)` /
    # `assert hasattr(...)` which are legitimate type checks, producing ~934 false
    # positives. The only universally-tautological form is `assert <expr> or True`,
    # which short-circuits to True regardless of <expr>.
    pattern: 'assert\s+.*\s+or\s+True\b'
    exclude_globs:
      - "scripts/maintenance/validate_vetinari.py"
      - "tests/chaos/**"
      - "tests/runtime/test_config_matrix_*.py"
    severity: warning
    source_finding: pass-2334-prevention
    promoted_from_run: audit-prevention-2026-04-19
    promoted_at: "2026-04-19T00:00:00Z"
  - id: VET305
    category: supply_chain
    description: "Mutable Hugging Face/model load without immutable revision or local-only provenance policy."
    pattern_type: regex
    pattern: '(?s)\b(?:from_pretrained|snapshot_download|hf_hub_download)\s*\((?:(?!\brevision\s*=|\blocal_files_only\s*=\s*True|\bchecksum\b|\bdigest\b).)*\)'
    severity: warning
    source_finding: pass-2337-prevention-hf-mutable-load
    promoted_from_run: audit-prevention-2026-04-19
    promoted_at: "2026-04-19T00:00:00Z"
  - id: VET306
    category: supply_chain
    description: "Model or dataset artifact write targets the project/install tree; use an operator-owned cache root."
    pattern_type: regex
    pattern: '\b(?:DEFAULT_MODELS_DIR|project_root\s*/\s*["'']models["'']|Path\(__file__\).*models)'
    severity: warning
    source_finding: pass-2337-prevention-install-tree-model-write
    promoted_from_run: audit-prevention-2026-04-19
    promoted_at: "2026-04-19T00:00:00Z"
  - id: VET307
    category: package_metadata
    description: "Unsupported Python 3.14 classifier in release metadata; remove it or add a release gate that proves 3.14 support."
    pattern_type: regex
    include_globs:
      - "pyproject.toml"
      - "setup.cfg"
      - "setup.py"
    pattern: 'Programming Language :: Python :: 3\.14'
    severity: warning
    source_finding: pass-2341-prevention-python314-classifier
    promoted_from_run: audit-prevention-2026-04-19
    promoted_at: "2026-04-19T00:00:00Z"
  - id: VET308
    category: package_metadata
    description: "Legacy setup.py duplicates dependency metadata while pyproject.toml is authoritative; use one metadata source or prove parity."
    pattern_type: regex
    include_globs:
      - "setup.py"
    pattern: '\binstall_requires\s*='
    severity: warning
    source_finding: pass-2341-prevention-duplicate-setup-deps
    promoted_from_run: audit-prevention-2026-04-19
    promoted_at: "2026-04-19T00:00:00Z"
  - id: VET309
    category: proof_quality
    description: "Release certifier uses bare asserts before a PASSED banner; replace with explicit checks that still run under optimized Python."
    pattern_type: regex
    pattern: '(?s)\bassert\b.{0,12000}All validation checks PASSED!?'
    severity: warning
    source_finding: pass-2342-prevention-release-certifier-bare-assert
    promoted_from_run: audit-prevention-2026-04-19
    promoted_at: "2026-04-19T00:00:00Z"
  - id: VET310
    category: proof_quality
    description: "Path-evidence regex captures only an extension; use full-match extraction or non-capturing groups before matching evidence targets."
    pattern_type: regex
    pattern: 'PATH_RX\s*=\s*re\.compile\s*\(\s*r?["''][^"'']*\\\.\((?!\?:)'
    severity: warning
    source_finding: pass-2345-claim-evidence-path-capture
    promoted_from_run: audit-prevention-2026-04-19
    promoted_at: "2026-04-19T00:00:00Z"
  - id: VET311
    category: proof_quality
    description: "Promotion pipeline returns success when no valid candidates remain; fail closed or emit an explicit non-proof advisory status."
    pattern_type: regex
    pattern: '(?s)if\s+not\s+candidates\s*:\s*(?:logger\.\w+\([^)]*\)\s*)?return\s+0'
    severity: warning
    source_finding: pass-2345-zero-candidate-promotion-pass
    promoted_from_run: audit-prevention-2026-04-19
    promoted_at: "2026-04-19T00:00:00Z"
  - id: VET315
    category: accessibility
    description: "Retained UI motion path lacks a reduced-motion contract; honor prefers-reduced-motion or prove the surface is dormant."
    pattern_type: regex
    include_globs:
      - "vetinari/web/**/*.css"
      - "vetinari/web/**/*.js"
      - "vetinari/web/**/*.html"
      - "web/**/*.css"
      - "web/**/*.js"
      - "web/**/*.html"
    pattern: 'animation:\s*[^;\n]+|transition:\s*[^;\n]+|duration:\s*[1-9][0-9]{2,}|pulse-[A-Za-z0-9_-]+'
    severity: warning
    source_finding: pass-2345-reduced-motion-gap
    promoted_from_run: audit-prevention-2026-04-19
    promoted_at: "2026-04-19T00:00:00Z"
  - id: VET316
    category: proof_quality
    description: "Claim-evidence matching accepts a claimed path by finding it in the claim text itself; require evidence target matching instead."
    pattern_type: regex
    pattern: 'path\.lower\(\)\s+in\s+claim_lower'
    severity: warning
    source_finding: pass-2346-claim-evidence-tautology
    promoted_from_run: audit-prevention-2026-04-19
    promoted_at: "2026-04-19T00:00:00Z"
  - id: VET317
    category: proof_quality
    description: "Promotion candidate regex is appended without compile-time validation; compile patterns before writing rules."
    pattern_type: regex
    pattern: '(?s)candidates\.append\(\s*\{.{0,500}"pattern"\s*:\s*fields\["pattern"\]'
    severity: warning
    source_finding: pass-2346-promotion-regex-not-compiled
    promoted_from_run: audit-prevention-2026-04-19
    promoted_at: "2026-04-19T00:00:00Z"
