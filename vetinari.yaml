# vetinari.yaml (MVP manifest)
project_name: Vetinari
description: Local-LM orchestration for task workflows using llama-cpp-python
created_at: 2026-03-01T12:00:00Z

# 1) Auto-discovery configuration
# GGUF models are auto-discovered from VETINARI_MODELS_DIR (default: ./models).
auto_discover: true
discovery_source: "Local filesystem scan for .gguf files in VETINARI_MODELS_DIR"
discover_interval_minutes: 1440  # daily scans by default

# 2) Model registry (static baseline + dynamic auto-discovery)
# Models are discovered from .gguf files. These are reference entries.
models:
  - id: qwen3-vl-32b
    name: qwen3-vl-32b-gemini-heretic-uncensored-thinking
    capabilities: ["code_gen", "docs", "debug", "vision"]
    context_len: 32768
    memory_gb: 20
    version: "3.0"
  - id: qwen25-coder-7b
    name: qwen2.5-coder-7b
    capabilities: ["code_gen", "fast"]
    context_len: 32768
    memory_gb: 6
    version: "2.5"
  - id: qwen3-30b
    name: qwen3-30b-a3b
    capabilities: ["code_gen", "reasoning"]
    context_len: 32768
    memory_gb: 18
    version: "3.0"

# 3) Tasks (two-task example; extendable)
tasks:
  - id: t1
    description: "Plan project scaffold (CLI skeleton with basic API)"
    inputs: ["high_level_goal"]
    outputs: ["CLI_skeleton", "API_routes"]
    dependencies: []
    # assigned_model_id must match an id in the models list above or a
    # dynamically discovered GGUF model. glm47/zglm47 were removed (undefined).
    assigned_model_id: qwen25-coder-7b
    # Prompts are loaded from prompts_dir (see below). Inline prompt blobs
    # are not supported by the runtime — use the prompts/ directory instead.
    prompts_ref:
      init: "t1_init.txt"
      run: "t1_run.txt"
      post: "t1_post.txt"
  - id: t2
    description: "Implement core CLI and REST API scaffold"
    inputs: ["CLI_skeleton", "API_routes"]
    outputs: ["compiled_tool", "docs"]
    dependencies: ["t1"]
    assigned_model_id: qwen25-coder-7b
    prompts_ref:
      init: "t2_init.txt"
      run: "t2_run.txt"
      post: "t2_post.txt"
artifacts_dir: "outputs"
prompts_dir: "prompts"
logging:
  level: INFO
  log_dir: "logs"
upgrade_policy:
  auto_upgrade: true
  require_approval: true
  benchmarks_source: ["local_latency", "online_benchmarks"]
  post_upgrade_validation: true
output_strategy:
  multi_language_support: true
discovery_filters:
  allow_unverified_models: false
  max_context_len: 32768
  min_capabilities: ["code_gen"]
  max_model_memory_gb: 96
