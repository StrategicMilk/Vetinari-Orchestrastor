# Pre-commit hooks for Vetinari
# Install: pip install pre-commit && pre-commit install
# Run all: pre-commit run --all-files

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
        exclude: ^outputs/
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: debug-statements
      - id: detect-private-key

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.4
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: mypy
        name: mypy (typed modules)
        entry: python scripts/quality/run_mypy_gate.py --config-file=pyproject.toml vetinari/adapters vetinari/analytics vetinari/backend_config.py vetinari/adapter_manager.py vetinari/system/health_monitor.py vetinari/preflight.py vetinari/setup/init_wizard.py vetinari/cli_packaging_doctor.py
        language: system
        pass_filenames: false

  - repo: local
    hooks:
      - id: pyright
        name: pyright (typed modules)
        entry: python -m pyright -p pyrightconfig.json
        language: system
        pass_filenames: false

  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.8
    hooks:
      - id: bandit
        args: [-c, pyproject.toml]
        additional_dependencies: ['bandit[toml]']
        exclude: ^tests/

  - repo: local
    hooks:
      - id: vetinari-rules
        name: Vetinari project rules (custom lint)
        entry: python scripts/quality/check_vetinari_rules.py --errors-only
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]

# Default fast gate path is ruff + typed mypy subset + pyright + bandit + VET.
# Semgrep and Vulture remain targeted tools via static-analysis/CI instead of
# pre-commit because they are slower and better suited to focused sweeps.
