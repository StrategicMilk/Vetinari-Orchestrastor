# Local Jaeger all-in-one container for OpenTelemetry trace collection.
#
# Usage:
#   docker compose -f deploy/docker-compose.otel.yaml up -d
#
# Then start Vetinari with OTEL enabled:
#   VETINARI_OTEL_BACKEND=jaeger docker compose -f deploy/docker-compose.otel.yaml up vetinari
#
# Or run Vetinari outside Docker:
#   VETINARI_OTEL_BACKEND=jaeger python -m vetinari serve
#
# Jaeger UI is available at http://localhost:16686

services:
  jaeger:
    image: jaegertracing/all-in-one:1.54
    ports:
      - "127.0.0.1:4317:4317"   # OTLP gRPC receiver, local-only
      - "127.0.0.1:16686:16686" # Jaeger web UI, local-only
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    restart: unless-stopped

  vetinari:
    # Uses the deploy/Dockerfile which includes the observability extra.
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      VETINARI_WEB_HOST: "0.0.0.0"
      VETINARI_WEB_PORT: "8080"
      VETINARI_OTEL_BACKEND: "jaeger"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://jaeger:4317"
    depends_on:
      - jaeger
    restart: unless-stopped
